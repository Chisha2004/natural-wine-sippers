spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sippers
    username: devuser
    password: impossible
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
      platform: mysql