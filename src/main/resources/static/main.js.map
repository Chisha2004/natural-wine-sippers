<div class="flex h-screen">
  <!-- Sidebar -->
  <div
    [class.w-64]="!collapsed"
    [class.w-16]="collapsed"
    class="transition-all duration-300 bg-gray-800 text-white flex flex-col"
  >
    <button
      (click)="toggleSidebar()"
      class="p-2 text-left hover:bg-gray-700 focus:outline-none"
    >
      {{ collapsed ? '☰' : 'Collapse' }}
    </button>
    @if(!collapsed){
    <nav class="flex-1 p-4">
      <a href="#" class="block py-2 hover:bg-gray-700 rounded px-2"
        >Dashboard</a
      >
      <a href="#" class="block py-2 hover:bg-gray-700 rounded px-2">Settings</a>
      <a href="#" class="block py-2 hover:bg-gray-700 rounded px-2">Profile</a>
    </nav>
    }
  </div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <header class="flex justify-between items-center bg-white shadow px-6 py-4">
      <h1 class="text-xl font-semibold">Dashboard</h1>
      <button
        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded"
        (click)="logout()"
      >
        Logout
      </button>
    </header>

    <!-- Page content -->
    <main class="p-6 bg-gray-100 flex-1">
      <p>Welcome to your dashboard!</p>
    </main>
  </div>
</div>
