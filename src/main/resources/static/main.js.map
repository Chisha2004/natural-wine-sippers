<!-- Shopping Cart Button -->
<div class="relative">
  <button
    class="relative p-2 rounded-full hover:bg-gray-100 transition"
    aria-label="Cart"
    (click)="showCart = !showCart"
  >
    <svg
      class="w-6 h-6 text-gray-700"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.35 2.7a1 1 0 00.9 1.5h12.2M16 17a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"
      />
    </svg>
    @if (cartItems() && cartItems().length > 0) {
    <span
      class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-semibold rounded-full px-1.5 py-0.5"
      >{{ cartItems().length }}</span
    >
    }
  </button>

  <!-- Dropdown -->
  @if(showCart){
  <div
    class="absolute right-0 mt-2 w-80 bg-white border border-gray-200 rounded-xl shadow-lg z-50 text-sm divide-y divide-gray-100"
  >
    <div class="p-4 font-medium text-gray-700">Your Cart</div>
    <ul class="max-h-60 overflow-y-auto">
      <!-- Item from cart service -->
      @for (item of cartItems(); track item.productId) {
      <li class="flex items-center justify-between px-4 py-3 hover:bg-gray-50">
        <div class="flex items-center gap-3">
          <img
            src="https://via.placeholder.com/40"
            class="w-10 h-10 rounded-md object-cover"
            alt="Item"
          />
          <div>
            <div class="font-medium text-gray-800">{{ item.productId }}</div>
            <div class="text-gray-500 text-xs">Qty: {{ item.quantity }}</div>
          </div>
        </div>
        <div class="font-semibold text-gray-700">€0.00</div>
      </li>
      }
    </ul>
    <div class="p-4 flex justify-between items-center">
      <span class="font-semibold text-gray-800">Total:</span>
      <span class="text-lg font-bold text-gray-900">€12.97</span>
    </div>
    <div class="p-4">
      <a
        href="/checkout"
        class="block text-center bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition"
      >
        Checkout
      </a>
    </div>
  </div>
  }
</div>
